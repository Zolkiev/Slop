<!doctype html>
<!-- Page de preuve visuelle : rend une carte par personnage à portrait, sans
     passer par la pioche aléatoire. Servie par Vite : /cards-proof.html -->
<html lang="fr">
<head><meta charset="utf-8"><title>Logres — preuve cartes</title>
<style>
@font-face{font-family:'Cinzel';src:url('assets/fonts/cinzel-700.woff2') format('woff2');font-weight:700}
@font-face{font-family:'EB Garamond';src:url('assets/fonts/ebgaramond.woff2') format('woff2');font-weight:400 700;font-style:normal}
@font-face{font-family:'EB Garamond';src:url('assets/fonts/ebgaramond-italic.woff2') format('woff2');font-weight:400;font-style:italic}
body{background:#14111c;margin:0;display:flex;gap:12px;justify-content:center}
</style>
</head>
<body>
<script type="module">
import { drawCard, CARD_W, CARD_H } from '/src/render/card.js';

// ?chars=morgane,lancelot,eveque — clés de fichiers dans assets/portraits/
const DEFAULTS = ['morgane', 'lancelot', 'eveque'];
const keys = (new URLSearchParams(location.search).get('chars') ?? '').split(',').filter(Boolean);
const TEXT = 'Sous les anciens rois, le petit peuple recevait lait et miel à chaque lune. Le nouveau roi honorera-t-il l’usage ?';
const CARDS = (keys.length ? keys : DEFAULTS).map((k) => ({ speaker: k, text: TEXT }));
const FILES = Object.fromEntries(CARDS.map((c) => [c.speaker, c.speaker]));

const load = (url) => new Promise((res) => {
  const img = new Image();
  img.onload = () => res(img);
  img.onerror = () => res(null);
  img.src = url;
});

// page à dessin unique : les polices doivent être prêtes avant drawCard
await Promise.all([
  document.fonts.load('700 19px Cinzel'),
  document.fonts.load('400 18px "EB Garamond"'),
  document.fonts.load('700 17px "EB Garamond"'),
]);
const plate = await load('assets/ui/card-plate.png');
for (const card of CARDS) {
  const canvas = document.createElement('canvas');
  canvas.width = CARD_W + 40;
  canvas.height = CARD_H + 40;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const portrait = await load(`assets/portraits/${FILES[card.speaker]}.png`);
  drawCard(ctx, { card: { ...card, left: {}, right: {} }, portrait, plate,
    centerX: canvas.width / 2, centerY: canvas.height / 2 });
}
document.title = 'ready';
</script>
</body>
</html>
